{% extends 'base.html' %}

{% block title %}Eliminar ticket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Eliminar ticket</h1>
                <p>Estas seguro de eliminar el ticket <strong>{{ ticket.code }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a class="btn btn-outline-secondary" href="{% url 'tickets:detail' ticket.pk %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
